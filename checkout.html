<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - ShopNext</title>
    <link rel="stylesheet" href="css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f8f9fa;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header Styles */
        .top-bar {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            padding: 10px 0;
            font-size: 13px;
        }

        .top-bar-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .top-links {
            display: flex;
            gap: 25px;
        }

        .top-links a {
            color: #ccc;
            transition: color 0.3s;
        }

        .top-links a:hover {
            color: #fff;
        }

        .top-right {
            display: flex;
            gap: 20px;
        }

        .top-right a {
            color: #ccc;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.3s;
        }

        .top-right a:hover {
            color: #fff;
        }

        .header {
            background: #fff;
            box-shadow: 0 2px 15px rgba(0,0,0,0.08);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar {
            padding: 15px 0;
        }

        .nav-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 30px;
        }

        .logo a {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 20px;
        }

        .logo-text {
            font-size: 26px;
            font-weight: 700;
            color: #1a1a2e;
        }

        .logo-text span {
            color: #e74c3c;
        }

        .checkout-steps {
            display: flex;
            justify-content: center;
            gap: 0;
            padding: 30px 0;
            background: #fff;
        }

        .step {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 30px;
            color: #999;
        }

        .step.active {
            color: #e74c3c;
        }

        .step.completed {
            color: #27ae60;
        }

        .step-number {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        .step.active .step-number {
            background: #e74c3c;
            color: #fff;
        }

        .step.completed .step-number {
            background: #27ae60;
            color: #fff;
        }

        .step-divider {
            width: 60px;
            height: 2px;
            background: #eee;
        }

        /* Checkout Section */
        .checkout-section {
            padding: 40px 0;
        }

        .checkout-container {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
        }

        .checkout-form {
            background: #fff;
            border-radius: 12px;
            padding: 35px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.08);
        }

        .form-section {
            margin-bottom: 35px;
        }

        .form-section h3 {
            font-size: 20px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 25px;
            padding-bottom: 12px;
            border-bottom: 2px solid #eee;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-row.full {
            grid-template-columns: 1fr;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #e74c3c;
        }

        .payment-methods {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        .payment-method {
            padding: 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .payment-method:hover,
        .payment-method.active {
            border-color: #e74c3c;
            background: #ffeaea;
        }

        .payment-method i {
            font-size: 32px;
            margin-bottom: 10px;
            display: block;
        }

        .payment-method span {
            font-weight: 600;
            font-size: 14px;
        }

        .card-details {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 25px;
        }

        /* Order Summary */
        .order-summary {
            background: #fff;
            border-radius: 12px;
            padding: 30px;
            position: sticky;
            top: 100px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.08);
        }

        .order-summary h3 {
            font-size: 22px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #eee;
        }

        .order-item {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }

        .order-item-image {
            width: 70px;
            height: 70px;
            border-radius: 8px;
            overflow: hidden;
            background: #f5f5f5;
        }

        .order-item-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .order-item-info {
            flex: 1;
        }

        .order-item-info h4 {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .order-item-info p {
            font-size: 13px;
            color: #888;
        }

        .order-item-price {
            font-weight: 700;
            color: #e74c3c;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 15px;
        }

        .summary-row span:first-child {
            color: #666;
        }

        .summary-row span:last-child {
            font-weight: 600;
            color: #333;
        }

        .summary-row.total {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px solid #eee;
            font-size: 20px;
        }

        .summary-row.total span:last-child {
            color: #e74c3c;
            font-weight: 700;
        }

        .place-order-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 25px;
        }

        .place-order-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(39, 174, 96, 0.3);
        }

        .secure-checkout {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 15px;
            color: #888;
            font-size: 13px;
        }

        .secure-checkout i {
            color: #27ae60;
        }

        /* Footer */
        .footer {
            background: #1a1a2e;
            color: #fff;
            margin-top: 60px;
        }

        .footer-main {
            padding: 50px 0 30px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .footer-grid {
            display: grid;
            grid-template-columns: 1.5fr repeat(3, 1fr);
            gap: 35px;
        }

        .footer-business-info h4 {
            font-size: 18px;
            margin-bottom: 12px;
            color: #fff;
            font-weight: 600;
        }

        .footer-business-info > p {
            color: #999;
            font-size: 13px;
            margin-bottom: 18px;
            line-height: 1.6;
        }

        .business-details p {
            color: #999;
            font-size: 13px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .business-details i {
            color: #fff;
            width: 16px;
            font-size: 12px;
        }

        .footer-column h4 {
            font-size: 15px;
            margin-bottom: 18px;
            color: #fff;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .footer-column ul li {
            margin-bottom: 10px;
        }

        .footer-column ul li a {
            color: #999;
            font-size: 13px;
            transition: all 0.3s;
        }

        .footer-column ul li a:hover {
            color: #fff;
            padding-left: 3px;
        }

        .footer-bottom {
            background: #16213e;
            padding: 15px 0;
        }

        .footer-bottom-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .payment-methods-display {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .payment-methods-display span {
            font-size: 12px;
            color: #999;
        }

        .payment-methods-display i {
            font-size: 28px;
            color: #fff;
        }

        .footer-links {
            display: flex;
            gap: 20px;
        }

        .footer-links a {
            color: #999;
            font-size: 12px;
            transition: color 0.3s;
        }

        .footer-links a:hover {
            color: #fff;
        }

        .copyright p {
            font-size: 14px;
            color: #aaa;
        }

        @media (max-width: 992px) {
            .checkout-container {
                grid-template-columns: 1fr;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .payment-methods {
                grid-template-columns: 1fr;
            }

            .footer-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="top-bar">
            <div class="container">
                <div class="top-bar-content">
                    <div class="top-right" id="top-right">
                        <a href="#"><i class="fas fa-map-marker-alt"></i> Store Finder</a>
                        <a href="#"><i class="fas fa-phone"></i> 1-800-SHOP-NEXT</a>
                        <a href="#"><i class="fas fa-question-circle"></i> Help</a>
                    </div>
                </div>
            </div>
        </div>
        
        <nav class="navbar">
            <div class="container">
                <div class="nav-content">
                    <div class="logo">
                        <a href="index.html">
                            <div class="logo-icon"><i class="fas fa-bolt"></i></div>
                            <span class="logo-text">Shop<span>Next</span></span>
                        </a>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <div class="checkout-steps">
        <div class="step completed">
            <span class="step-number"><i class="fas fa-check"></i></span>
            <span>Cart</span>
        </div>
        <div class="step-divider"></div>
        <div class="step active">
            <span class="step-number">2</span>
            <span>Checkout</span>
        </div>
        <div class="step-divider"></div>
        <div class="step">
            <span class="step-number">3</span>
            <span>Confirmation</span>
        </div>
    </div>

    <main class="checkout-section">
        <div class="container">
            <div class="checkout-container">
                <div class="checkout-form">
                    <div class="form-section">
                        <h3><i class="fas fa-truck"></i> Shipping Information</h3>
                        <div class="form-row">
                            <div class="form-group">
                                <label>First Name *</label>
                                <input type="text" id="firstName" required>
                            </div>
                            <div class="form-group">
                                <label>Last Name *</label>
                                <input type="text" id="lastName" required>
                            </div>
                        </div>
                        <div class="form-row full">
                            <div class="form-group">
                                <label>Email Address *</label>
                                <input type="email" id="email" required>
                            </div>
                        </div>
                        <div class="form-row full">
                            <div class="form-group">
                                <label>Phone Number *</label>
                                <input type="tel" id="phone" required>
                            </div>
                        </div>
                        <div class="form-row full">
                            <div class="form-group">
                                <label>Street Address *</label>
                                <input type="text" id="address" required>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>City *</label>
                                <input type="text" id="city" required>
                            </div>
                            <div class="form-group">
                                <label>Province *</label>
                                <select id="province" required>
                                    <option value="">Select Province</option>
                                    <option value="AB">Alberta</option>
                                    <option value="BC">British Columbia</option>
                                    <option value="MB">Manitoba</option>
                                    <option value="NB">New Brunswick</option>
                                    <option value="NL">Newfoundland and Labrador</option>
                                    <option value="NS">Nova Scotia</option>
                                    <option value="ON">Ontario</option>
                                    <option value="PE">Prince Edward Island</option>
                                    <option value="QC">Quebec</option>
                                    <option value="SK">Saskatchewan</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Postal Code *</label>
                                <input type="text" id="postalCode" required>
                            </div>
                            <div class="form-group">
                                <label>Country *</label>
                                <select id="country" required>
                                    <option value="CA">Canada</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="form-section">
                        <h3><i class="fas fa-credit-card"></i> Payment Method</h3>
                        <div class="payment-methods">
                            <div class="payment-method active" onclick="selectPayment('visa')">
                                <i class="fab fa-cc-visa"></i>
                                <span>Visa</span>
                            </div>
                            <div class="payment-method" onclick="selectPayment('mastercard')">
                                <i class="fab fa-cc-mastercard"></i>
                                <span>Mastercard</span>
                            </div>
                            <div class="payment-method" onclick="selectPayment('amex')">
                                <i class="fab fa-cc-amex"></i>
                                <span>Amex</span>
                            </div>
                        </div>
                        
                        <div class="card-details">
                            <div class="form-row full">
                                <div class="form-group">
                                    <label>Card Number *</label>
                                    <input type="text" id="cardNumber" placeholder="1234 5678 9012 3456" required>
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label>Expiry Date *</label>
                                    <input type="text" id="expiry" placeholder="MM/YY" required>
                                </div>
                                <div class="form-group">
                                    <label>CVV *</label>
                                    <input type="text" id="cvv" placeholder="123" required>
                                </div>
                            </div>
                            <div class="form-row full">
                                <div class="form-group">
                                    <label>Name on Card *</label>
                                    <input type="text" id="cardName" required>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="order-summary">
                    <h3>Order Summary</h3>
                    <div id="order-items"></div>
                    
                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span id="subtotal">$0.00</span>
                    </div>
                    <div class="promo-code-section" style="margin:12px 0;padding:12px;background:#f8f9fa;border-radius:8px;">
                        <label style="font-size:13px;font-weight:600;color:#333;margin-bottom:6px;display:block;">Promo Code</label>
                        <div style="display:flex;gap:8px;">
                            <input type="text" id="promo-input" placeholder="Enter code" style="flex:1;padding:8px 12px;border:1px solid #ddd;border-radius:6px;font-size:14px;text-transform:uppercase;">
                            <button onclick="applyPromoCode()" style="padding:8px 16px;background:#667eea;color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;">Apply</button>
                        </div>
                        <div id="promo-message" style="font-size:12px;margin-top:6px;"></div>
                        <div id="user-promo-info" style="font-size:12px;margin-top:8px;color:#666;"></div>
                    </div>
                    <div class="summary-row" id="discount-row" style="display:none;color:#27ae60;">
                        <span>Discount (10%)</span>
                        <span id="discount">-$0.00</span>
                    </div>
                    <div class="summary-row">
                        <span>Shipping</span>
                        <span id="shipping">Free</span>
                    </div>
                    <div class="summary-row">
                        <span>Tax</span>
                        <span id="tax">$0.00</span>
                    </div>
                    <div class="summary-row total">
                        <span>Total</span>
                        <span id="total">$0.00</span>
                    </div>
                    
                    <button class="place-order-btn" onclick="placeOrder()">
                        <i class="fas fa-lock"></i> Place Order
                    </button>
                    <div class="secure-checkout">
                        <i class="fas fa-shield-alt"></i>
                        <span>Secure 256-bit SSL Encryption</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-main">
            <div class="container">
                <div class="footer-grid" id="footer-grid"></div>
            </div>
        </div>
        <div class="footer-bottom">
            <div class="container">
                <div class="footer-bottom-content">
                    <div class="payment-methods-display" id="payment-methods"></div>
                    <div class="footer-links">
                        <a href="privacy-policy.html">Privacy Policy</a>
                        <a href="#">Terms of Use</a>
                        <a href="#">Accessibility</a>
                    </div>
                    <div class="copyright" id="copyright"></div>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script src="user.js?v=5"></script>
    <script src="emailjs-config.js"></script>
    <script src="email-service.js"></script>
    <script src="email-notifications.js"></script>
    <script src="canadapost-config.js"></script>
    <script src="canadapost-address.js"></script>
    <script src="postal-code-db.js"></script>
    <script src="header-loader.js?v=5"></script>
    <script src="footer-loader.js?v=5"></script>
    <script src="checkout.js?v=7"></script>
</body>
</html>
